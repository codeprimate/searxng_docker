services:
  redis:
    image: redis:7-alpine
    container_name: searxng-redis
    command: redis-server --save 30 1 --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - searxng
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "${SEARXNG_PORT:-7777}:${SEARXNG_PORT:-7777}"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_PROTOCOL=${SEARXNG_PROTOCOL:-http}
      - SEARXNG_HOST=${SEARXNG_HOST:-localhost}
      - SEARXNG_PORT=${SEARXNG_PORT:-7777}
      - GRANIAN_PORT=${SEARXNG_PORT:-7777}
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL:-http://localhost:7777}
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-supersecretkey}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    networks:
      - searxng
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://${SEARXNG_HOST:-localhost}:${SEARXNG_PORT:-7777}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  searxng-mcp:
    build: ./mcp-server
    container_name: searxng-mcp
    ports:
      - "${SEARXNG_MCP_PORT:-7778}:${SEARXNG_MCP_PORT:-7778}"
    environment:
      - SEARXNG_PROTOCOL=${SEARXNG_PROTOCOL:-http}
      - SEARXNG_HOST=searxng
      - SEARXNG_PORT=${SEARXNG_PORT:-7777}
      - PORT=${SEARXNG_MCP_PORT:-7778}
      - EXTRACT_ENABLED=${EXTRACT_ENABLED:-true}
      - EXTRACTOR_SIDECAR_URL=${EXTRACTOR_SIDECAR_URL:-http://extractor-sidecar:3000}
      - EXTRACT_TIMEOUT=${EXTRACT_TIMEOUT:-120}
      - EXTRACT_MAX_LENGTH=${EXTRACT_MAX_LENGTH:-524288}
      - EXTRACT_MAX_JSON_BODY_BYTES=${EXTRACT_MAX_JSON_BODY_BYTES:-524288}
      - MCP_STREAMABLE_PATH=${MCP_STREAMABLE_PATH:-/mcp}
      - MCP_STREAMABLE_ENABLED=${MCP_STREAMABLE_ENABLED:-true}
      - MCP_STATELESS_HTTP=${MCP_STATELESS_HTTP:-true}
      - MCP_JSON_RESPONSE=${MCP_JSON_RESPONSE:-true}
    depends_on:
      - searxng
    networks:
      - searxng
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${SEARXNG_MCP_PORT:-7778}/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  extractor-sidecar:
    build: ./extractor-sidecar
    container_name: extractor-sidecar
    environment:
      - PORT=3000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-google/gemini-3.1-flash-lite}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - EXTRACT_MAX_LENGTH=${EXTRACT_MAX_LENGTH:-524288}
      - EXTRACT_MAX_JSON_BODY_BYTES=${EXTRACT_MAX_JSON_BODY_BYTES:-524288}
      - EXTRACT_OPENROUTER_TIMEOUT_MS=${EXTRACT_OPENROUTER_TIMEOUT_MS:-115000}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/1}
      - EXTRACT_CACHE_ENABLED=${EXTRACT_CACHE_ENABLED:-true}
      - EXTRACT_CACHE_TTL_SECONDS=${EXTRACT_CACHE_TTL_SECONDS:-86400}
    depends_on:
      - redis
    networks:
      - searxng
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  redis-data:
    name: searxng-redis-data

networks:
  searxng:
    driver: bridge
